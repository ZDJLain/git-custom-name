<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 300px;
            height: 300px;
            background-color: green;
        }
        h1 {
            text-decoration: underline;
            text-align: center;
        }

        h2 {
            text-decoration: overline;
            text-align: left;
        }

        h3 {
            text-decoration: line-through;
            text-align: right;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>你好</h1>
        <h2>我是</h2>
        <h3>L</h3>
    </div>

</body>

</html>
