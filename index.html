<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTest</title>
</head>
<body>
    <header>
    <h1>标题1</h1>
    <h2>标题2</h2>
    <h3>标题3</h3>
    <h4>标题4</h4>
    <h5>标题5</h5>
    <h6>标题6</h6>
    <p>段落</p>
    <p>这是一个<br>换行标签</p>
    <p>这是水平线<hr width="500px" align="left" size="10px" color="red"></p>
    <img src="1.webp" alt="没有图片" title="美少女" width="300px">
    <br>
    <a href="https://www.baidu.com/index.htm">百度一下的超链接</a>
    <a href="https://www.baidu.com/index.htm">
        <img src="2.webp" alt="没有图片" title="度娘" width="200px">
    </a>
    </header>
    

    <nav> 
    <span>没有任何属性的文本</span>
    <i>斜体字文本</i>
    <em>着重文字文本</em>
    <b>粗体字文本</b>
    <strong>加重语气文本</strong> 
    <del>删除字</del>
    </nav>
   

    <article>
    <p>有序和无序列表</p>
    <ol type="a">
        <li>
            水果
            <ul type="circle">
                <li>香蕉</li>
                <li>苹果</li>
            </ul>
        </li>
        <li>蔬菜</li>
        <li>肉类</li>
    </ol>
    </article>
    

    <aside>
    <p>合并单元格1，2</p>
    <p>合并单元格3，6</p>
    <p>合并单元格7，8，10，11</p>
    <table border="1px">
        <tr>
            <td colspan="2">单元格1和2</td>
            
            <td rowspan="2">单元格3和6</td>
        </tr>
        <tr>
            <td>单元格4</td>
            <td>单元格5</td>
        </tr>
        <tr>
            <td colspan="2" rowspan="2">单元格7，8，10，11</td>
            <td>单元格9</td>
        </tr>
        <tr>
            <td>单元格12</td>
        </tr>
    </table>
    </aside>

    <footer>
    <p>表单</p>

    <form name="账号提交">
        <label for="username">用户名:</label>
        <input type="text" id="username">
        <label for="password">密码:</label>
        <input type="password" id="password">
        <input type="submit" value="登录">
    </form>

    <div>新增标签容器元素</div>
    </footer>
    
</body>
</html>
